<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #f4f4f4;
}

.container{
    width: 400px;
    margin: auto;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input{
    padding: 8px;
    margin: 5px;
}

button{
    padding: 10px 20px;
    margin-top: 10px;
    background-color: blue;
    color: white;
    border: none;
    border-radius: 5px;
}

#result{
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Student Result Calculator</h2>

<label>Enter Number of Subjects:</label><br>
<input type="number" id="subjects"><br>

<button onclick="calculate()">Enter Marks</button>

<div id="result"></div>

</div>

<script>

function calculate(){

let subjects = document.getElementById("subjects").value;

let total = 0;

for(let i=1;i<=subjects;i++)
{
    let marks = parseFloat(prompt("Enter marks for Subject " + i));
    total = total + marks;
}

let average = total/subjects;

let grade;
let result;

if(average>=90)
grade="A+";

else if(average>=75)
grade="A";

else if(average>=60)
grade="B";

else if(average>=50)
grade="C";

else
grade="F";

if(average>=40)
result="PASS";
else
result="FAIL";

document.getElementById("result").innerHTML=
"Total Marks: "+total+"<br>"+
"Average Marks: "+average.toFixed(2)+"<br>"+
"Grade: "+grade+"<br>"+
"Result: "+result;

}

</script>

</body>
</html>
