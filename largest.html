<!DOCTYPE html>
<html>
<head>
<title>Largest of Three Numbers</title>
</head>
<body>

<script>

let a = 10;
let b = 25;
let c = 15;

let largest = (a > b) 
                ? (a > c ? a : c) 
                : (b > c ? b : c);

document.write("Largest number is: " + largest);

</script>

</body>
</html>
