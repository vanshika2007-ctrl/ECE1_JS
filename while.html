<!DOCTYPE html>
<html>
<head>
    <title>JavaScript While Loop Example</title>
</head>
<body>

<script>
let count = 0;

document.write("Starting loop<br>");

while (count < 10) {
    document.write("Current count: " + count + "<br>");
    count++;
}

document.write("<br>Loop stopped<br><br>");
</script>
<p>set the variables to different value and then try</p>
</body>
</html>
